    auxiliary:
      - "#10B981"
  typography:
    baseSize: "14px"
    scale: 1.2
  spacing:
    unit: "4px"
  radius:
    base: "6px"
structure:
  requiredSections:
    - colors
    - typography
    - spacing
    - rounded
    - elevation
    - components
    - breakpoints
  componentTokens:
    - button
    - input
    - card
    - select
    - checkbox
    - radio
    - modal
    - stepper
    - alert

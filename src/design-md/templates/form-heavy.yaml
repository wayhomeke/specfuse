id: form-heavy
name: Form Heavy
category: form-heavy
intent:
  mood: Structured and reassuring — guides users through complex multi-step flows
  density: Medium density, forms need vertical breathing room for label-input-error stacking
  philosophy: Progressive disclosure reduces cognitive load; validate inline, never surprise at submission
dimensions:
  colorTemp: 2
  lightness: 4
  density: 3
  borderRadius: 3
  tone: 2

id: content-docs
name: Content Documentation
category: content
dimensions:
  colorTemp: 2
  lightness: 4
  density: 3
  borderRadius: 2
  tone: 2
anchors:
  primary: Docusaurus
  auxiliary:
    - GitBook
    - ReadTheDocs
template: |
  tokens:
    colors:
      primary: "#2E8555"
      background: "#FFFFFF"
      surface: "#F5F6F7"
      text: "#1C1E21"
      accent: "#25C2A0"
    spacing:
      base: "4px"
      scale: [4, 8, 12, 16, 24, 32, 48, 64]
    radius:
      default: "4px"
      large: "8px"
    typography:
      fontFamily: "'-apple-system', 'Segoe UI', sans-serif"
      scale: [12, 14, 16, 18, 20, 24, 30]
    density:
      compact: false
      tableRowHeight: "40px"

id: dashboard-monitoring
name: Dashboard Monitoring
category: dashboard
dimensions:
  colorTemp: 1
  lightness: 1
  density: 1
  borderRadius: 1
  tone: 1
anchors:
  primary: PagerDuty
  auxiliary:
    - Uptime Robot
    - StatusPage
template: |
  tokens:
    colors:
      primary: "#06AC38"
      background: "#0D1117"
      surface: "#161B22"
      text: "#C9D1D9"
      accent: "#F85149"
    spacing:
      base: "4px"
      scale: [2, 4, 8, 12, 16, 24, 32]
    radius:
      default: "3px"
      large: "4px"
    typography:
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace"
      scale: [10, 11, 12, 14, 16, 18, 22]
    density:
      compact: true
      tableRowHeight: "28px"

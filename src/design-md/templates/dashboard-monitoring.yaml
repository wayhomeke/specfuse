id: dashboard-monitoring
name: Dashboard Monitoring
category: dashboard
intent:
  mood: Alert-driven and status-aware — visual hierarchy serves urgency levels
  density: Maximum density, real-time feeds with minimal chrome
  philosophy: Monospace typography and tight grids for pattern recognition; color = system state, not brand
dimensions:
  colorTemp: 1
  lightness: 1
  density: 1
  borderRadius: 1
  tone: 1
anchors:
  colors:
    primary: "#06AC38"
    auxiliary:
      - "#F85149"
  typography:
    baseSize: "12px"
    scale: 1.15
  spacing:
    unit: "4px"
  radius:
    base: "3px"
structure:
  requiredSections:
    - colors
    - typography
    - spacing
    - rounded
    - elevation
    - components
    - breakpoints
  componentTokens:
    - button
    - input
    - card
    - table
    - badge
    - alert
    - tooltip
    - status-indicator

type: object
required:
  - id
  - name
  - category
  - dimensions
  - anchors
  - template
properties:
  id:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
  name:
    type: string
  category:
    type: string
    enum:
      - internal-tool
      - dashboard
      - consumer
      - developer
      - mobile
      - e-commerce
      - marketing
      - form-heavy
      - content
  dimensions:
    type: object
    required:
      - colorTemp
      - lightness
      - density
      - borderRadius
      - tone
    properties:
      colorTemp:
        type: integer
        minimum: 1
        maximum: 5
      lightness:
        type: integer
        minimum: 1
        maximum: 5
      density:
        type: integer
        minimum: 1
        maximum: 5
      borderRadius:
        type: integer
        minimum: 1
        maximum: 5
      tone:
        type: integer
        minimum: 1
        maximum: 5
  anchors:
    type: object
    required:
      - primary
      - auxiliary
    properties:
      primary:
        type: string
      auxiliary:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 2
  template:
    type: string

id: e-commerce
name: E-Commerce
category: e-commerce
intent:
  mood: Confident and inviting — drives action without feeling pushy
  density: Medium density, product cards with clear pricing and CTA hierarchy
  philosophy: Every element earns its space by contributing to the purchase decision; trust signals are never decorative
dimensions:
  colorTemp: 3
  lightness: 4
  density: 3
  borderRadius: 3
  tone: 3
anchors:
  colors:
    primary: "#FF6900"
    auxiliary:
      - "#1A1A1A"
  typography:
    baseSize: "16px"
    scale: 1.25
  spacing:
    unit: "4px"
  radius:
    base: "8px"
structure:
  requiredSections:
    - colors
    - typography
    - spacing
    - rounded
    - elevation
    - components
    - breakpoints
  componentTokens:
    - button
    - input
    - card
    - badge
    - modal
    - product-card
    - price-tag
    - rating
    - breadcrumb
